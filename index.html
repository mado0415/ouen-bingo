<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>応援タスクBINGO</title>
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            /* 雪をイメージしたベースデザインの色味 */
            --bg-start: #eef6fc;
            --bg-end: #ffffff;
            --main-text: #1a2b3c;
            --sub-text: #5a7b9c;
            --shadow-color: rgba(78, 168, 222, 0.15);
            
            /* JavaScriptで動的に変わる推し色（初期値はスノーブルー） */
            --check-color: #4ea8de;
            --check-text: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--main-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px var(--shadow-color);
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
        }
        h1 {
            font-size: 22px;
            margin: 0 0 4px 0;
            color: #2b4c6f;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        p.subtitle {
            font-size: 12px;
            color: var(--sub-text);
            margin: 0 0 15px 0;
            line-height: 1.4;
        }
        
        /* 🎨 カラーパレットセクション */
        .color-selector {
            background: #f4f7f9;
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 15px;
        }
        .color-label {
            font-size: 11px;
            color: var(--sub-text);
            margin-bottom: 8px;
            font-weight: bold;
        }
        .color-dots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .color-dot.active {
            transform: scale(1.2);
            border-color: #1a2b3c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        /* 自由色（カラーピッカー）の丸ボタン */
        .picker-wrapper {
            position: relative;
            width: 24px;
            height: 24px;
        }
        .picker-btn {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff4500, #ff8c00, #ffd700, #32cd32, #1e90ff, #9370db);
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: white;
            font-weight: bold;
        }
        .picker-wrapper input[type="color"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* ✏️ 編集ボタン */
        .edit-btn {
            background: #ffffff;
            color: var(--sub-text);
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
            width: 100%;
        }
        
        /* 3x3 ビンゴデザイン */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .cell {
            aspect-ratio: 1;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--main-text);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 6px;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
            line-height: 1.3;
            word-break: break-all;
            overflow: hidden;
        }
        /* チェックがついた時（選択された推し色に染まる） */
        .cell.checked {
            background: var(--check-color);
            border-color: transparent;
            color: var(--check-text);
            transform: scale(0.96);
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.15), 0 4px 10px var(--shadow-color);
        }
        /* 編集モード中 */
        .grid.edit-mode .cell {
            background: #ffffff;
            border: 2px dashed var(--check-color);
            cursor: default;
        }
        .cell textarea {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: bold;
            color: var(--main-text);
            text-align: center;
            resize: none;
            outline: none;
            font-family: inherit;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 𝕏ボタン */
        .share-btn {
            background: #000000;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
